name: policy-check
description: Run policy_check from local repository source

inputs:
  profile:
    description: Policy profile (must match .paul-project.yml)
    required: true
  version:
    description: Policy version (must match .paul-project.yml)
    required: true

runs:
  using: composite
  steps:
    - name: Run policy_check
      shell: bash
      run: |
        "${{ github.action_path }}/run.sh" \
          "${{ inputs.profile }}" \
          "${{ inputs.version }}"
