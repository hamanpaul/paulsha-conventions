name: policy-check (reusable)

on:
  workflow_call:
    inputs:
      policy_profile:
        description: Policy profile (stage-driven or flat)
        required: true
        type: string
      policy_version:
        description: Policy version to enforce
        required: true
        type: string
      policy_engine_ref:
        description: >
          Tag or commit SHA in hamanpaul/paulsha-conventions to check out as the
          policy engine. Must be an explicit tag or pinned commit SHA pointing at 
          paulsha-conventions — do NOT pass github.workflow_sha here because in a 
          cross-repo reusable workflow that SHA belongs to the caller's repo, not to 
          paulsha-conventions. Branch refs are disallowed by R-15 (Caller workflow 
          pinning rule).
          Example: "v1.0.0" or a full commit SHA such as "abc1234".
        required: true
        type: string

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Explicit checkout of paulsha-conventions gives the policy_check module
      # a deterministic, caller-independent location.  Using uses: ./.github/actions/...
      # inside a reusable workflow would resolve against the CALLER's repo (where the
      # action does not exist), causing an action-not-found error.
      #
      # Use inputs.policy_engine_ref (not github.workflow_sha) because in a cross-repo
      # reusable workflow the github context is always associated with the CALLER workflow.
      # github.workflow_sha therefore points at the caller's repo SHA, not at a
      # paulsha-conventions SHA.  Callers must supply an explicit tag or pinned SHA.
      - name: Checkout policy engine
        uses: actions/checkout@v4
        with:
          repository: hamanpaul/paulsha-conventions
          ref: ${{ inputs.policy_engine_ref }}
          path: .policy-engine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install policy engine
        run: python -m pip install --disable-pip-version-check ".policy-engine"

      - name: Run policy check
        run: |
          bash .policy-engine/.github/actions/policy-check/run.sh \
            "${{ inputs.policy_profile }}" \
            "${{ inputs.policy_version }}"
        env:
          GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
