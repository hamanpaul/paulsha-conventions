name: policy-check (reusable)

on:
  workflow_call:
    inputs:
      policy_profile:
        description: Policy profile (stage-driven or flat)
        required: true
        type: string
      policy_version:
        description: Policy version to enforce
        required: true
        type: string

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install local package
        run: python -m pip install -e .

      - name: Run policy check
        uses: ./.github/actions/policy-check
        with:
          profile: ${{ inputs.policy_profile }}
          version: ${{ inputs.policy_version }}
