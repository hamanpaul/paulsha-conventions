name: policy-check (reusable)

on:
  workflow_call:
    inputs:
      policy_profile:
        description: Policy profile (stage-driven or flat)
        required: true
        type: string
      policy_version:
        description: Policy version to enforce
        required: true
        type: string

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install action runtime
        run: python -m pip install --disable-pip-version-check "PyYAML>=6.0"

      - name: Run policy check
        uses: ./.github/actions/policy-check
        env:
          GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        with:
          profile: ${{ inputs.policy_profile }}
          version: ${{ inputs.policy_version }}
